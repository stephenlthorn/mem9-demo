# Three services for the mem9-demo booth setup:
#   mnemo-server   - upstream Go backend, built from source
#   mem9-dashboard - upstream Vite/React dashboard
#   booth-dashboard - our Python FastAPI + static HTML dashboard
#
# ./mem9/ is cloned by demo.sh at first run and is gitignored.

services:
  mnemo-server:
    build:
      context: .
      dockerfile: docker/mnemo-server.Dockerfile
    env_file:
      - path: .env
        required: false
    ports:
      - "8080:8080"

  mem9-dashboard:
    build:
      context: .
      dockerfile: docker/mem9-dashboard.Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      - NEXT_PUBLIC_API_URL=http://mnemo-server:8080
    ports:
      - "3000:4173"
    depends_on:
      - mnemo-server

  booth-dashboard:
    build: ./booth_dashboard
    env_file:
      - path: .env
        required: false
    environment:
      - MEM9_API_URL=${MEM9_API_URL_CONTAINER:-}
    ports:
      - "${BOOTH_DASHBOARD_PORT:-7001}:7000"
    depends_on:
      - mnemo-server
